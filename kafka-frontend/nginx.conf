server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # SPA 라우팅 — 새로고침 시 index.html 반환
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Producer 서버 (kafka-test1:8080) 프록시
    # /api/producer/api/orders → kafka-test1:8080/api/orders
    location /api/producer/ {
        proxy_pass http://kafka-test1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Consumer 서버 (kafka-test2:8081) 프록시
    # /api/consumer/api/orders → kafka-test2:8081/api/orders
    location /api/consumer/ {
        proxy_pass http://kafka-test2:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
