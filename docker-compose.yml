version: '3.8'

# ── 실행 방법 ──────────────────────────────────────────────────────────────────
# 기본 실행 (기본값 내장 — .env 없어도 동작):
#   docker compose up --build
#
# 비밀번호 등 커스터마이징:
#   cp .env.example .env  →  .env 편집  →  docker compose up --build
#
# ESXi VM 등 원격 서버 배포 시:
#   .env 에 KAFKA_EXTERNAL_HOST=<서버 IP> 설정
#   (CLI 패널에서 Bootstrap Server를 <서버IP>:29092 로 입력)
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  kafka:
    image: apache/kafka:3.9.0
    environment:
      INSTANA_SERVICE_NAME: kafka-broker
      # KRaft 모드 (Zookeeper 없음)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # PLAINTEXT: 내부 서비스 간 / EXTERNAL: 호스트에서 CLI 실습용
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://${KAFKA_EXTERNAL_HOST:-localhost}:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
    ports:
      - "29092:29092"   # 호스트에서 Kafka CLI 실습 시 사용
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  mysql:
    image: mysql:8.0
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      INSTANA_SERVICE_NAME: kafka-mysql
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-paxp}
      MYSQL_DATABASE: ${DB_NAME:-kafka_test}
    ports:
      - "3307:3306"   # 로컬 MySQL과 충돌 방지
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    environment:
      INSTANA_SERVICE_NAME: kafka-redis
    ports:
      - "6380:6379"   # 로컬 Redis와 충돌 방지
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Spring Boot Apps ───────────────────────────────────────────────────────

  kafka-test1:
    build:
      context: ./kafka-test1
      dockerfile: Dockerfile
    environment:
      # DB_HOST / KAFKA_HOST / REDIS_HOST 는 Docker 서비스명으로 고정
      # (로컬 .env 의 DB_HOST=localhost 등과 충돌하지 않음)
      DB_HOST: mysql
      DB_NAME: ${DB_NAME:-kafka_test}
      DB_USER: ${DB_USER:-root}
      DB_PASS: ${DB_PASS:-paxp}
      KAFKA_HOST: kafka
      REDIS_HOST: redis
      REDIS_PORT: 6379
      INSTANA_SERVICE_NAME: kafka-producer
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  kafka-test2:
    build:
      context: ./kafka-test2
      dockerfile: Dockerfile
    environment:
      DB_HOST: mysql
      DB_NAME: ${DB_NAME:-kafka_test}
      DB_USER: ${DB_USER:-root}
      DB_PASS: ${DB_PASS:-paxp}
      KAFKA_HOST: kafka
      INSTANA_SERVICE_NAME: kafka-consumer
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: on-failure

  # ── Frontend (nginx) ───────────────────────────────────────────────────────

  kafka-frontend:
    build:
      context: ./kafka-frontend
      dockerfile: Dockerfile
    environment:
      INSTANA_SERVICE_NAME: kafka-frontend
    ports:
      - "80:80"
    depends_on:
      - kafka-test1
      - kafka-test2

volumes:
  kafka-data:
  mysql-data:
